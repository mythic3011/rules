sources:
  # Example:
  # - id: my_custom_dnsmasq
  #   enabled: true
  #   priority: 100
  #   format: dnsmasq_conf
  #   url: https://raw.githubusercontent.com/<owner>/<repo>/<branch>/adblock-for-dnsmasq.conf
  #   homepage: https://github.com/<owner>/<repo>
  #
  # Supported formats:
  # - dnsmasq_conf
  # - domainswild2
  # - plain_domains
  # - hosts

  # Optional broad merged adblock feed.
  # Keep disabled by default because it overlaps heavily with the baseline
  # adblock sources and may increase false positives for some users.
  - id: adblockfilters_217heidai
    enabled: false
    priority: 40
    format: dnsmasq_conf
    url: https://raw.githubusercontent.com/217heidai/adblockfilters/main/rules/adblockdnsmasq.txt
    homepage: https://github.com/217heidai/adblockfilters
