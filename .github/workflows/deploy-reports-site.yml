name: Deploy reports site

on:
  push:
    branches: ["main"]
    paths:
      - "site/**"
      - "reports/**"
      - "dns/**"
      - "rule/**"
      - "py/generate_adblock_outputs.py"
      - "doc/openclash/RULE_ASSET_MATCHING_CONTRACT.md"
      - ".github/workflows/deploy-reports-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build static site payload
        run: |
          rm -rf _site
          mkdir -p _site/reports _site/dns _site/rule
          cp -R site/. _site/
          cp -R reports/. _site/reports/
          cp -R dns/. _site/dns/
          cp -R rule/. _site/rule/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
