name: Auto generate AI profiles

on:
  push:
    paths:
      - "py/generate_ai_profiles.py"
      - ".github/workflows/auto-generate-ai-profiles.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-ai-profiles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Generate AI profile outputs
        run: python3 py/generate_ai_profiles.py

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cfg/Custom_Clash_AI.ini cfg/yaml/Custom_Clash_AI.yaml cfg/yaml/Custom_Clash_AI_Strict.yaml rule/AI_*_Classical.yaml

          if ! git diff --cached --quiet; then
            git commit -m "chore(ai): auto generate AI profiles"
            git push
          else
            echo "No generated changes."
          fi
