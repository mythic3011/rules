# Custom_OpenClash_Rules
# YAML 配置文件（AI 专用 / 非 GFW 用户）
# 基于 Custom_Clash.yaml 精简：仅保留 AI 分流与基础网络配置

# ==================== 端口配置 Port Configuration ====================
port: 7890
socks-port: 7891
mixed-port: 7893
redir-port: 7892
tproxy-port: 7895
allow-lan: true
bind-address: "*"
mode: rule
tcp-concurrent: true
unified-delay: true

# ==================== 代理提供者 Proxy Provider ====================
proxy-providers:
  provider1:
    type: http
    url: "url"
    interval: 3600
    path: ./proxy_provider/provider1.yaml
    proxy: DIRECT
    header:
    health-check:
      enable: true
      interval: 600
      url: https://cp.cloudflare.com/generate_204
    override:
      skip-cert-verify: true
      udp: true

# ==================== 地理数据库配置 GeoData Configuration ====================
geox-url:
  mmdb: https://testingcf.jsdelivr.net/gh/alecthw/mmdb_china_ip_list@release/Country.mmdb
  geoip: https://testingcf.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat
  geosite: https://testingcf.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat
  asn: https://testingcf.jsdelivr.net/gh/xishang0128/geoip@release/GeoLite2-ASN.mmdb
geo-auto-update: true
geo-update-interval: 24
geodata-mode: true

# ==================== 日志与控制 ====================
log-level: info
ipv6: true
external-controller: 0.0.0.0:9090

# ==================== 配置文件存储 Profile ====================
profile:
  store-selected: true
  store-fake-ip: true

# ==================== TUN 虚拟网卡配置 ====================
tun:
  enable: true
  stack: system
  dns-hijack:
    - 0.0.0.0:53
  auto-detect-interface: false
  auto-route: false
  auto-redirect: false
  strict-route: false
  endpoint-independent-nat: true

# ==================== DNS 配置 ====================
dns:
  enable: true
  listen: 0.0.0.0:7874
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - localhost.ptlogin2.qq.com
    - geosite:cn
  fake-ip-filter-mode: blacklist
  respect-rules: true
  default-nameserver:
    - tls://223.5.5.5:853
    - tls://119.29.29.29:853
  nameserver:
    - https://dns.alidns.com/dns-query#h3=true
    - https://doh.pub/dns-query
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
  proxy-server-nameserver:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
  nameserver-policy:
    "geosite:private":
      - https://dns.alidns.com/dns-query#h3=true
      - https://doh.pub/dns-query
    "geosite:cn":
      - https://dns.alidns.com/dns-query#h3=true
      - https://doh.pub/dns-query
    "geosite:openai":
      - https://1.1.1.1/dns-query
      - https://dns.google/dns-query
    "geosite:bing":
      - https://1.1.1.1/dns-query
      - https://dns.google/dns-query
    "+.anthropic.com":
      - https://1.1.1.1/dns-query
      - https://dns.google/dns-query
    "+.claude.ai":
      - https://1.1.1.1/dns-query
      - https://dns.google/dns-query
    "+.perplexity.ai":
      - https://1.1.1.1/dns-query
      - https://dns.google/dns-query
    "+.x.ai":
      - https://1.1.1.1/dns-query
      - https://dns.google/dns-query
    "+.poe.com":
      - https://1.1.1.1/dns-query
      - https://dns.google/dns-query
# ==================== 代理策略组 Proxy Groups ====================
proxy-groups:
  - name: "🚀 手动选择"
    type: select
    proxies:
      - "♻️ 自动选择"
      - "🇺🇸 美国节点"
      - "🇯🇵 日本节点"
      - "🇸🇬 新加坡节点"
      - "🇼🇸 台湾节点"
      - "🇰🇷 韩国节点"
    filter: "^(?!.*(DIRECT|直接连接|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|Traffic|GB|Expire)).*$"
    use:
      - provider1

  - name: "♻️ 自动选择"
    type: url-test
    filter: "^(?!.*(DIRECT|直接连接|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|Traffic|GB|Expire)).*$"
    tolerance: 50
    url: "https://cp.cloudflare.com/generate_204"
    interval: 300
    use:
      - provider1

  - name: "🤖 ChatGPT"
    type: fallback
    url: "https://cp.cloudflare.com/generate_204"
    interval: 300
    proxies:
      - "🚀 手动选择"
