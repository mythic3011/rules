;Custom_OpenClash_Rules
;AI 专用订阅转换模板（多 Provider 分组）
;作者：https://github.com/Aethersailor
;项目地址：https://github.com/Aethersailor/Custom_OpenClash_Rules
;基于 Custom_Clash.ini 精简并拆分 AI 服务策略组
;<建议>搭配本项目配套设置，实现最佳化的 OpenClash 使用效果！
;设置方案：https://github.com/Aethersailor/Custom_OpenClash_Rules/wiki/OpenClash-%E8%AE%BE%E7%BD%AE%E6%96%B9%E6%A1%88

[custom]
;设置规则标志位
;以下规则，按照从上往下的顺序遍历，优先命中上位规则，规则重复无影响
;修改顺序会影响分流效果

;本地地址和域名直连
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve
;谷歌在国内可用的域名直连
ruleset=🎯 全球直连,[]GEOSITE,google-cn

;AI Provider 拆分
ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=🤖 Copilot,[]GEOSITE,bing
ruleset=🤖 Claude,[]DOMAIN-SUFFIX,anthropic.com
ruleset=🤖 Claude,[]DOMAIN-SUFFIX,claude.ai
ruleset=🤖 Gemini,[]DOMAIN-SUFFIX,ai.google.dev
ruleset=🤖 Gemini,[]DOMAIN-SUFFIX,makersuite.google.com
ruleset=🤖 Gemini,[]DOMAIN-SUFFIX,generativelanguage.googleapis.com
ruleset=🤖 Perplexity,[]DOMAIN-SUFFIX,perplexity.ai
ruleset=🤖 Grok,[]DOMAIN-SUFFIX,x.ai
ruleset=🤖 Poe,[]DOMAIN-SUFFIX,poe.com
ruleset=🤖 Claude,[]DOMAIN-KEYWORD,anthropic
ruleset=🤖 Claude,[]DOMAIN-KEYWORD,claude
ruleset=🤖 Perplexity,[]DOMAIN-KEYWORD,perplexity
ruleset=🤖 Grok,[]DOMAIN-KEYWORD,xai
ruleset=🤖 Grok,[]DOMAIN-KEYWORD,grok
ruleset=🤖 Poe,[]DOMAIN-KEYWORD,poe
ruleset=🤖 Copilot,[]DOMAIN-KEYWORD,copilot

;国内域名/IP 兜底直连
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve
;其余流量默认直连，避免影响非 AI 业务
ruleset=🐟 漏网之鱼,[]FINAL
;设置规则标志位结束

;设置节点分组标志位
custom_proxy_group=🚀 手动选择`select`[]♻️ 自动选择`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇼🇸 台湾节点`[]🇰🇷 韩国节点`.*
